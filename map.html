<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nightwatch map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
      background: #08111f;
    }

    .leaflet-tile {
      filter: brightness(.55) saturate(.7) hue-rotate(160deg);
    }

    .beam {
      stroke: #00e5ff;
      stroke-width: 3;
      filter: drop-shadow(0 0 6px #00e5ff);
    }

    .pulse {
      fill: #fff;
      stroke: #00e5ff;
      stroke-width: 3;
      filter: drop-shadow(0 0 8px #00e5ff);
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="map.js"></script>
</body>
</html>
